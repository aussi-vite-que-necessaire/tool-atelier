<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>contentos</title>
  <style>
    :root {
      color-scheme: light dark;
      --ink: #18181b;
      --paper: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --ink: #ededed; --paper: #0a0a0a; }
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 36rem;
      margin: 6rem auto;
      padding: 0 1.5rem;
      line-height: 1.6;
      color: var(--ink);
      background: var(--paper);
    }
    h1 { font-size: 2rem; margin: 0 0 0.5rem; font-weight: 800; letter-spacing: -0.02em; }
    p { margin: 0.5rem 0; opacity: 0.8; }
    ul { padding: 0; margin: 2rem 0 0; list-style: none; display: grid; gap: 0.5rem; }
    li a {
      display: block;
      padding: 0.75rem 1rem;
      border: 1px solid color-mix(in srgb, var(--ink) 25%, transparent);
      border-radius: 0.5rem;
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    li a small { display: block; font-weight: 400; opacity: 0.7; margin-top: 0.15rem; }
    li a:hover, li a:focus-visible {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
  </style>
</head>
<body>
  <h1>contentos</h1>
  <p>Suite de tools pour produire, planifier et publier du contenu.</p>
  <ul>
    <li><a href="https://cast.contentos.ch">cast <small>publication LinkedIn</small></a></li>
    <li><a href="https://media.contentos.ch">media <small>génération et édition de visuels</small></a></li>
    <li><a href="https://ressources.contentos.ch">ressources <small>lead magnets</small></a></li>
    <li><a href="https://skills.contentos.ch">skills <small>hub des skills agentiques</small></a></li>
  </ul>
</body>
</html>
