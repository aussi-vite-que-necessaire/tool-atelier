name: deploy
on:
  push:
    branches: ["**"]
    # Un push qui ne touche QUE la plomberie d'atelier (docs, skills, README…) ne reconstruit pas
    # une image ni ne redéploie une preview : rien d'observable n'a changé côté app.
    paths-ignore:
      - "docs/**"
      - ".claude/**"
      - "CLAUDE.md"
      - "README.md"
      - "LICENSE"
      - ".gitignore"
  delete: {}

permissions:
  contents: read
  packages: write

concurrency:
  # event_name dans la clé : un event `delete` (github.ref = refs/heads/main) ne partage plus
  # le groupe d'un push prod, sinon le teardown se fait annuler.
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  # Annule un run de preview précédent quand on repousse la même branche ; jamais sur main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
    steps:
      - id: env
        run: |
          ref='${{ github.ref_name }}'
          # main = palier d'INTÉGRATION (suite assemblée sur app.preview.contentos.ch). prod n'est
          # pas un envoi auto : c'est une promotion explicite d'artefact (cf. promote.yml). Les
          # autres branches → preview par-branche.
          if [ "$ref" = "main" ]; then e=integration; else
            e="$(printf '%s' "$ref" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g;s/^-*//;s/-*$//')"
          fi
          [ -n "$e" ] || { echo "::error::branche sans slug exploitable: $ref"; exit 1; }
          echo "env=$e" >> "$GITHUB_OUTPUT"

  # Build + push des deux images (web + worker), EN PARALLÈLE du job `test`. Le deploy ne fait
  # que pull ces images, il ne rebuild jamais. Cache buildx GHA scopé par target (web/worker)
  # pour réutiliser les couches `npm ci` / `next build` entre builds chauds. Contexte = racine.
  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (target ${{ matrix.target }})
        env:
          TGT: ${{ matrix.target }}
          ENV_TAG: ${{ needs.detect.outputs.env }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/$OWNER/atelier-app-$TGT:$ENV_TAG"
          echo "::group::build $IMG"
          docker buildx build --target="$TGT" \
            --cache-from "type=gha,scope=app-$TGT" \
            --cache-to   "type=gha,mode=max,scope=app-$TGT" \
            --tag "$IMG" --push .
          echo "::endgroup::"

  # Gate de tests (host) : unit + integration + worker, puis build de validation. Tourne en
  # parallèle du build des images.
  test:
    needs: detect
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      APP_URL: http://localhost:3000
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-placeholder-secret-ci-placeholder
      DATABASE_URL: postgres://app:app@localhost:5432/app_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: npm ci
      - name: Prepare test DB
        run: npm run db:test:prepare
      - name: Unit + integration + worker
        run: npm test
      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      - name: Build (validation)
        run: npm run build

  # Deploy = pull (les images sont déjà construites par `build` et validées par `test`).
  deploy:
    needs: [detect, build, test]
    if: |
      !cancelled()
      && needs.build.result == 'success'
      && needs.test.result == 'success'
    runs-on: ubuntu-latest
    env:
      ENV: ${{ needs.detect.outputs.env }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute IMAGES (web + worker)
        id: images
        run: |
          set -euo pipefail
          IMAGES_PARAM="web=ghcr.io/$OWNER/atelier-app-web:$ENV,worker=ghcr.io/$OWNER/atelier-app-worker:$ENV"
          echo "param=$IMAGES_PARAM" >> "$GITHUB_OUTPUT"
          echo "IMAGES=$IMAGES_PARAM"
      - name: Deploy to lab
        env:
          LAB_SSH_KEY: ${{ secrets.LAB_SSH_KEY }}
          LAB_HOST: ${{ secrets.LAB_HOST }}
          IMAGES: ${{ steps.images.outputs.param }}
        run: |
          # Course push/delete : une suppression de branche déclenche un teardown dans un autre run.
          # Si la branche a disparu pendant que ce deploy attendait/tournait, on s'abstient — sinon on
          # recréerait une preview (conteneurs + base + route) pour une branche qui n'existe plus.
          # Combiné au verrou flock de deploy.sh, ça garantit le bon état final quel que soit l'ordre.
          if [ "$ENV" != "integration" ] && ! git ls-remote --exit-code --heads origin "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "branche ${GITHUB_REF_NAME} supprimée entre-temps — pas de déploiement"; exit 0
          fi
          install -m700 -d ~/.ssh
          printf '%s\n' "$LAB_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$LAB_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@$LAB_HOST"
          SCP="scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          $SSH "mkdir -p /opt/lab/apps/app-${ENV}"
          $SCP scripts/deploy.sh "root@$LAB_HOST:/opt/lab/deploy.sh"
          $SCP compose.yml "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/compose.yml"
          $SCP lab.json "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/lab.json"
          # Secrets chiffrés (age) consommés par l'app : global + app (déjà chiffrés). deploy.sh
          # les déchiffre sur lab avec /opt/lab/secrets-key. sysadmin n'est jamais copié.
          if [ -f secrets/global.env.age ]; then
            $SCP secrets/global.env.age "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/global.env.age"
          fi
          if [ -f secrets/projects/app.env.age ]; then
            $SCP secrets/projects/app.env.age "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/app.env.age"
          fi
          $SSH "bash /opt/lab/deploy.sh 'app' '$ENV' '$IMAGES'"
      - name: Résumé
        run: |
          if [ "$ENV" = "integration" ]; then host="app.preview.contentos.ch"; else host="app-${ENV}.preview.contentos.ch"; fi
          echo "🚀 **app** (\`${ENV}\`) déployé → https://${host}" >> "$GITHUB_STEP_SUMMARY"

  teardown:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Teardown de la preview de la branche
        env:
          LAB_SSH_KEY: ${{ secrets.LAB_SSH_KEY }}
          LAB_HOST: ${{ secrets.LAB_HOST }}
          REF: ${{ github.event.ref }}
        run: |
          env="$(printf '%s' "$REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g;s/^-*//;s/-*$//')"
          { [ "$env" = "main" ] || [ "$env" = "integration" ] || [ "$env" = "prod" ]; } && { echo "jamais de teardown sur $env"; exit 0; }
          install -m700 -d ~/.ssh
          printf '%s\n' "$LAB_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$LAB_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@$LAB_HOST"
          SCP="scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          $SCP scripts/teardown.sh "root@$LAB_HOST:/opt/lab/teardown.sh"
          $SSH "[ -d /opt/lab/apps/app-$env ] && bash /opt/lab/teardown.sh app '$env' || echo 'pas de preview app-$env'"
