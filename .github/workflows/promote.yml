name: promote
# Promotion explicite vers la PROD, déclenchée à la main. Ne REBUILD jamais : re-tague les images
# `:integration` (déjà construites et testées sur le palier d'intégration = main) en `:prod` côté
# GHCR — la MÊME image, donc exactement ce qui a été validé — puis déploie en prod (deploy.sh
# régénère le .env prod : APP_URL = contentos.ch via apex, secrets prod).
on:
  workflow_dispatch: {}

permissions:
  contents: write   # pousser le tag de promotion
  packages: write   # re-taguer sur GHCR

concurrency:
  # Une promotion à la fois (le verrou flock de deploy.sh sérialise déjà côté lab).
  group: promote-prod
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      ENV: prod
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Re-tag :integration → :prod (sans rebuild) + compute IMAGES
        id: images
        run: |
          set -euo pipefail
          PARTS=""
          for role in web worker; do
            src="ghcr.io/$OWNER/atelier-app-$role:integration"
            dst="ghcr.io/$OWNER/atelier-app-$role:prod"
            echo "::group::re-tag $src → :prod"
            docker buildx imagetools create --tag "$dst" "$src"
            echo "::endgroup::"
            PARTS="${PARTS:+$PARTS,}$role=$dst"
          done
          echo "param=$PARTS" >> "$GITHUB_OUTPUT"
          echo "IMAGES=$PARTS"
      - name: Deploy to lab (prod)
        env:
          LAB_SSH_KEY: ${{ secrets.LAB_SSH_KEY }}
          LAB_HOST: ${{ secrets.LAB_HOST }}
          IMAGES: ${{ steps.images.outputs.param }}
        run: |
          install -m700 -d ~/.ssh
          printf '%s\n' "$LAB_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$LAB_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes root@$LAB_HOST"
          SCP="scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          $SSH "mkdir -p /opt/lab/apps/app-${ENV}"
          $SCP scripts/deploy.sh "root@$LAB_HOST:/opt/lab/deploy.sh"
          $SCP compose.yml "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/compose.yml"
          $SCP lab.json "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/lab.json"
          if [ -f secrets/global.env.age ]; then
            $SCP secrets/global.env.age "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/global.env.age"
          fi
          if [ -f secrets/projects/app.env.age ]; then
            $SCP secrets/projects/app.env.age "root@$LAB_HOST:/opt/lab/apps/app-${ENV}/app.env.age"
          fi
          $SSH "bash /opt/lab/deploy.sh 'app' '$ENV' '$IMAGES'"
      - name: Résumé
        run: echo "🚀 **app** promu en **prod** → https://contentos.ch" >> "$GITHUB_STEP_SUMMARY"

  tag:
    needs: promote
    if: ${{ !cancelled() && needs.promote.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pose un tag de promotion (traçabilité / rollback)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tag="prod-$(date -u +%Y%m%d-%H%M%S)"
          git tag -a "$tag" -m "Promotion prod (workflow promote)"
          git push origin "$tag"
          echo "🏷️ tag **$tag** posé sur \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
