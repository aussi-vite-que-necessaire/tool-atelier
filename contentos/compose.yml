services:
  # Web : serveur Next standalone (CMD image par défaut). Pas de port hôte ;
  # le reverse-proxy lab joint le service via son alias réseau ${UPSTREAM}.
  app:
    image: ${IMAGE_WEB:?IMAGE_WEB manquant}
    restart: unless-stopped
    env_file: [.env]
    networks:
      lab:
        aliases: ["${UPSTREAM:?UPSTREAM manquant}"]

  # Worker : image dédiée (consumers BullMQ via tsx). Aucun port, aucun alias
  # (pas joignable en HTTP). Mêmes env que web (DATABASE_URL, REDIS_URL, secrets).
  worker:
    image: ${IMAGE_WORKER:?IMAGE_WORKER manquant}
    restart: unless-stopped
    env_file: [.env]
    networks:
      - lab

networks:
  lab:
    name: lab
    external: true
